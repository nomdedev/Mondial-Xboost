name: CI — Mondial-Xboost

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore MondialXboost.sln

      - name: Build
        run: dotnet build MondialXboost.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test MondialXboost.Web.Tests --no-build --configuration Release

      - name: Vulnerable packages check
        run: dotnet list MondialXboost.sln package --vulnerable --include-transitive 2>&1 | tee vulnerable.log

  python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check predictors scripts backtest tests

      - name: Pytest
        run: pytest tests/ -q

  gates:
    name: Loop Engineering Gates
    runs-on: ubuntu-latest
    needs: [dotnet, python]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Restore .NET packages
        run: dotnet restore MondialXboost.sln

      - name: Build .NET (Debug)
        run: dotnet build MondialXboost.sln --no-restore --configuration Debug

      - name: Run verify-gates
        run: python scripts/verify-gates.py

      - name: Upload pipeline state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state
          path: .agents/logs/pipeline-state.json
